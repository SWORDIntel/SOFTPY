name: Test Suite

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Verify pure Python
        run: python verify_pure_python.py

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run adversarial tests
        run: pytest tests/adversarial/ -v --tb=short

      - name: Run self-test
        run: python selftest.py

      - name: Coverage report
        run: pytest tests/ --cov=crypto_standalone --cov-report=term-missing --cov-report=xml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install flake8
      - run: flake8 src/ --max-line-length=120 --exclude=__pycache__
